{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Create Team
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Team Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control">
                </textarea>

            </div>

            <button
                class="btn btn-primary">

                Create Team

            </button>

        </form>

    </div>

</div>

{% endblock %}
