{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Join Team
        </h2>

        <p class="text-muted">
            Enter the team code shared by your Team Leader
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Team Code
                </label>

                <input
                    type="text"
                    name="team_code"
                    class="form-control"
                    placeholder="Enter Team Code"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Join Team

            </button>

        </form>

    </div>

</div>

{% endblock %}
