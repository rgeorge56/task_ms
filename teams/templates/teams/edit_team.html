{% extends 'base.html' %}

{% block content %}

<div class="container">

```
<div class="card shadow p-4">

    <h2>Edit Team</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Team Name</label>

            <input
                type="text"
                name="name"
                value="{{ team.name }}"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>Description</label>

            <textarea
                name="description"
                class="form-control">{{ team.description }}</textarea>

        </div>

        <button
            class="btn btn-success">

            Update Team

        </button>

    </form>

</div>
```

</div>

{% endblock %}
