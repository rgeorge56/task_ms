{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Invite Team Member
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Send Invitation

            </button>

        </form>

    </div>

</div>

{% endblock %}
