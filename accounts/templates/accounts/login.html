{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card-custom">

        <h2>Login</h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control mb-3"
                placeholder="Username">

            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Password">

            <button class="btn btn-dark">
                Login
            </button>

        </form>

        <p class="mt-3">

            Don't have an account?

            <a href="{% url 'register' %}">
                Register
            </a>

        </p>

    </div>

</div>

{% endblock %}
