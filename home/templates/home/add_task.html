{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Create New Task
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"></textarea>

            </div>

            <div class="mb-3">

                <label>Priority</label>

                <select
                    name="priority"
                    class="form-control">

                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>

                </select>

            </div>

            <div class="mb-3">

                <label>Status</label>

                <select
                    name="status"
                    class="form-control">

                    <option>Pending</option>
                    <option>In Progress</option>
                    <option>Completed</option>

                </select>

            </div>

            <div class="mb-3">

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    class="form-control">

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Create Task

            </button>

        </form>

    </div>

</div>

{% endblock %}
