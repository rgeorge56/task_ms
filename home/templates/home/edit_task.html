{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Edit Task
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Task Title</label>

                <input
                    type="text"
                    name="title"
                    value="{{ task.title }}"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4">{{ task.description }}</textarea>

            </div>

            <div class="mb-3">

                <label>Priority</label>

                <select
                    name="priority"
                    class="form-control">

                    <option {% if task.priority == 'High' %}selected{% endif %}>
                        High
                    </option>

                    <option {% if task.priority == 'Medium' %}selected{% endif %}>
                        Medium
                    </option>

                    <option {% if task.priority == 'Low' %}selected{% endif %}>
                        Low
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label>Status</label>

                <select
                    name="status"
                    class="form-control">

                    <option {% if task.status == 'Pending' %}selected{% endif %}>
                        Pending
                    </option>

                    <option {% if task.status == 'In Progress' %}selected{% endif %}>
                        In Progress
                    </option>

                    <option {% if task.status == 'Completed' %}selected{% endif %}>
                        Completed
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label>Due Date</label>

                <input
                    type="date"
                    name="due_date"
                    value="{{ task.due_date|date:'Y-m-d' }}"
                    class="form-control">

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Update Task

            </button>

        </form>

    </div>

</div>

{% endblock %}
